<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Nights Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a14; color: white; font-family: 'DM Sans', sans-serif; text-align: center; padding: 20px;}
  .screen { display: none; flex-direction: column; height: 90vh; justify-content: center; }
  .active { display: flex; }
  
  input { width: 100%; padding: 15px; margin-bottom: 15px; font-size: 1.2rem; text-align: center; background: #111; color: #00ff88; border: 2px solid #00ff88; border-radius: 10px; font-family: 'Orbitron';}
  button { padding: 15px; font-size: 1.2rem; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-bottom: 10px; transition: 0.2s;}
  .btn-full { width: 100%; background: #00ff88; color: black; }
  .btn-full:disabled { background: #333; color: #666;}
  
  .balance { font-size: 2.5rem; color: #f0c040; font-family: 'Orbitron'; margin-bottom: 10px; }
  
  .powerup-row { display: flex; gap: 10px; margin-bottom: 15px; }
  .btn-power { flex: 1; background: rgba(0,212,255,0.1); border: 2px solid var(--cyan); color: #00d4ff; font-size: 0.9rem; padding: 10px; }
  .btn-power:disabled { border-color: #333; color: #555; background: transparent; }
  #peekResult { font-size: 0.85rem; color: #00d4ff; margin-bottom: 10px; min-height: 20px;}

  .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;}
  .ans-btn { background: #1a1a2e; border: 2px solid #333; color: white; font-size: 2rem; padding: 30px 10px;}
  .ans-btn.selected { border-color: #00ff88; background: rgba(0,255,136,0.2); color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.4);}
  .ans-btn:disabled { opacity: 0.1; cursor: not-allowed; border-color: #000; }
  
  .wager-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px;}
  .wager-btn { background: #1a1a2e; border: 2px solid #333; color: white; font-size: 1rem;}
  .wager-btn.selected { border-color: #f0c040; background: rgba(240,192,64,0.2); color: #f0c040; box-shadow: 0 0 15px rgba(240,192,64,0.4);}
  
  #errorMsg { color: #ff2d55; font-size: 0.9rem; min-height: 20px; margin-bottom: 10px;}
  .custom-input { width: 100%; padding: 15px; margin-bottom: 20px; font-size: 1.2rem; text-align: center; background: #1a1a2e; color: #00d4ff; border: 2px solid #333; border-radius: 10px; font-family: 'Orbitron'; outline: none;}
</style>
</head>
<body>

  <div id="joinScreen" class="screen active">
    <h1 style="font-family:'Orbitron'; color:#00ff88; margin-bottom:30px;">NEON NIGHTS</h1>
    <input type="tel" id="code" placeholder="4-DIGIT CODE" maxlength="4">
    <input type="text" id="name" placeholder="YOUR NAME" maxlength="10">
    <button class="btn-full" onclick="joinGame()">JOIN TABLE</button>
    <div id="errorMsg"></div>
  </div>

  <div id="lobbyScreen" class="screen"></div>
  
  <div id="gameOverScreen" class="screen">
    <h1 style="color:var(--gold); font-family:'Orbitron'; font-size: 3.5rem;">GAME OVER</h1>
    <p style="color:#888; font-size: 1.2rem; margin-top: 10px;">Look at the big screen!</p>
    <div id="finalRankDisplay" style="font-family:'Orbitron'; color:var(--gold); font-size:1.8rem; margin-top:30px;"></div>
  </div>

  <div id="bankruptScreen" class="screen">
    <h1 style="color:#ff2d55; font-family:'Orbitron'; font-size: 3.5rem;">ELIMINATED</h1>
    <p style="color:#888; font-size: 1.2rem; margin-top: 10px;">You ran out of chips.</p>
    <div id="deadRank" style="font-family:'Orbitron'; color:#f0c040; font-size:2rem; margin-top:30px;"></div>
    <p style="color:#444; margin-top: 40px; font-weight:bold;">SPECTATOR MODE</p>
  </div>

  <div id="betScreen" class="screen">
    <div style="color:#888; font-size:0.9rem;">YOUR CHIPS</div>
    <div class="balance" id="myBal"></div>
    
    <div class="powerup-row">
        <button class="btn-power" id="btn5050" onclick="use5050()">💡 50/50</button>
        <button class="btn-power" id="btnPeek" onclick="usePeek()">👁️ Peek</button>
    </div>
    <div id="peekResult"></div>

    <div class="ans-grid" id="ansGrid">
      <button class="ans-btn" id="ansA" onclick="selAns('A')">A</button>
      <button class="ans-btn" id="ansB" onclick="selAns('B')">B</button>
      <button class="ans-btn" id="ansC" onclick="selAns('C')">C</button>
      <button class="ans-btn" id="ansD" onclick="selAns('D')">D</button>
    </div>

    <div class="wager-grid" id="wagGrid">
      <button class="wager-btn" onclick="selWag(50)">$50</button>
      <button class="wager-btn" onclick="selWag(100)">$100</button>
      <button class="wager-btn" onclick="selWag(250)">$250</button>
      <button class="wager-btn" onclick="selWag(500)">$500</button>
      <button class="wager-btn" onclick="selWag(1000)">$1000</button>
      <button class="wager-btn" style="color:#ff2d55; border-color:#ff2d55;" onclick="selWag('all')">ALL IN</button>
    </div>
    <input type="number" id="customWag" class="custom-input" placeholder="Or Enter Custom $" oninput="selCustomWag()">

    <div id="betError" style="color:#ff2d55; margin-bottom:10px; min-height:20px;"></div>
    <button class="btn-full" id="confirmBtn" onclick="placeBet()" disabled>LOCK IN BET</button>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = "", myBal = 1000, ans = null, wag = null, myRank = 0, currentPhase = null;

  // --- CRASH-PROOF AUDIO ENGINE ---
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();

  function playTone(freq, type, dur) {
    try {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        
        // Force the volume to start at 1 and drop to 0 safely
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + dur);
    } catch (e) {
        console.warn("Audio disabled or blocked by browser.");
    }
  }

  document.body.addEventListener('click', () => { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});

  window.onload = () => {
      const savedCode = localStorage.getItem('nn_code');
      const savedName = localStorage.getItem('nn_name');
      if (savedCode && savedName) {
          document.getElementById('code').value = savedCode;
          document.getElementById('name').value = savedName;
          myName = savedName;
          socket.emit('join', { code: savedCode, name: savedName });
      }
  }

  socket.on('kicked', () => {
      localStorage.removeItem('nn_code');
      localStorage.removeItem('nn_name');
      alert("You have been kicked out of the table by the Host.");
      window.location.reload();
  });

  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function joinGame() {
    playTone(500, 'sine', 0.1);
    const c = document.getElementById('code').value.trim();
    myName = document.getElementById('name').value.trim();
    if(c && myName) {
        localStorage.setItem('nn_code', c);
        localStorage.setItem('nn_name', myName);
        socket.emit('join', { code: c, name: myName });
    }
  }

  socket.on('err', (msg) => {
      document.getElementById('errorMsg').innerText = msg;
      localStorage.removeItem('nn_code');
      localStorage.removeItem('nn_name');
  });

  function use5050() {
      playTone(900, 'square', 0.1);
      socket.emit('use_5050');
  }
  
  socket.on('5050_result', (toHide) => {
      document.getElementById('btn5050').disabled = true;
      document.getElementById('btn5050').innerText = "❌ Used";
      toHide.forEach(letter => {
          document.getElementById(`ans${letter}`).disabled = true;
          if (ans === letter) ans = null; 
      });
      checkValid();
  });

  function usePeek() {
      playTone(900, 'square', 0.1);
      socket.emit('use_peek');
  }

  socket.on('peek_result', (peekData) => {
      document.getElementById('btnPeek').disabled = true;
      document.getElementById('btnPeek').innerText = "❌ Used";
      if (peekData.length === 0) {
          document.getElementById('peekResult').innerText = "No other players to peek at!";
      } else {
          let text = "Top Players: ";
          peekData.forEach(p => text += `${p.name} (${p.bet}) `);
          document.getElementById('peekResult').innerText = text;
      }
  });

  function selAns(val) {
    playTone(600, 'sine', 0.1);
    if(navigator.vibrate) navigator.vibrate(20);
    ans = val;
    document.querySelectorAll('.ans-btn').forEach(b => {
      b.classList.remove('selected');
      if(b.innerText === val) b.classList.add('selected');
    });
    checkValid();
  }

  function selCustomWag() {
    const val = parseInt(document.getElementById('customWag').value);
    if (!isNaN(val) && val > 0) {
        wag = val;
        document.querySelectorAll('.wager-btn').forEach(b => b.classList.remove('selected'));
        checkValid();
    } else {
        wag = null;
        checkValid();
    }
  }

  function selWag(val) {
    playTone(700, 'sine', 0.1);
    if(navigator.vibrate) navigator.vibrate(20);
    wag = val;
    document.getElementById('customWag').value = ''; 
    document.querySelectorAll('.wager-btn').forEach(b => {
      b.classList.remove('selected');
      if(b.innerText === `$${val}` || (val === 'all' && b.innerText === 'ALL IN')) b.classList.add('selected');
    });
    checkValid();
  }

  function checkValid() {
    const btn = document.getElementById('confirmBtn');
    const err = document.getElementById('betError');
    err.innerText = "";
    if(ans && wag) {
      let numWag = wag === 'all' ? myBal : wag;
      if (numWag > myBal) {
        err.innerText = "You don't have enough chips!";
        btn.disabled = true;
      } else {
        btn.disabled = false;
        btn.innerText = `BET $${numWag} ON ${ans}`;
      }
    } else {
      btn.disabled = true;
      btn.innerText = "LOCK IN BET";
    }
  }

  function placeBet() {
    playTone(800, 'triangle', 0.2);
    if(navigator.vibrate) navigator.vibrate([50, 50, 50]);
    socket.emit('place_bet', { option: ans, amount: wag });
    document.getElementById('confirmBtn').innerText = "BET LOCKED";
    document.getElementById('confirmBtn').disabled = true;
  }

  socket.on('state', (state) => {
    const me = state.players.find(p => p.name === myName);
    
    if(me) {
      myBal = me.balance;
      document.getElementById('myBal').innerText = "$" + myBal;
      
      const sorted = [...state.players].sort((a,b) => {
          if (b.balance !== a.balance) return b.balance - a.balance;
          return (b.eliminatedAt || 0) - (a.eliminatedAt || 0);
      });
      myRank = sorted.findIndex(p => p.name === myName) + 1;
      const rankText = "LEADERBOARD RANK: #" + myRank;
      document.getElementById('deadRank').innerText = rankText;
      document.getElementById('finalRankDisplay').innerText = rankText;
    }
    
    if (state.phase === 'game_over') { show('gameOverScreen'); currentPhase = state.phase; return; }
    if (me && me.balance <= 0 && !me.bet && state.phase !== 'results') { show('bankruptScreen'); currentPhase = state.phase; return; }

    if (state.phase === 'lobby') {
      document.getElementById('lobbyScreen').innerHTML = `<h2 style="color:#00d4ff;">VIP LOUNGE</h2><p style="margin-top:10px; color:#888;">Waiting for host to deal...</p>`;
      show('lobbyScreen');
    } 
    else if (state.phase === 'results') {
      show('lobbyScreen');
      if (me && me.lastResult) {
        document.getElementById('lobbyScreen').innerHTML = `
          <h2 style="color:${me.lastResult.won ? '#00ff88' : '#ff2d55'}; font-size:2.5rem; font-family:'Orbitron';">
            ${me.lastResult.won ? 'YOU WON!' : 'YOU LOST!'}
          </h2>
          <p style="font-size:1.5rem; margin: 15px 0;">${me.lastResult.msg}</p>
          <div style="font-family:'Orbitron'; color:var(--gold); font-size:1.2rem; margin-top:20px;">LEADERBOARD RANK: #${myRank}</div>
        `;
        
        if(me.lastResult.won) {
            playTone(600, 'sine', 0.2); setTimeout(()=>playTone(800, 'sine', 0.4), 200);
            if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
        } else {
            playTone(200, 'sawtooth', 0.5);
            if(navigator.vibrate) navigator.vibrate(500);
        }
      }
    } 
    else if(state.phase === 'betting') {
      if (currentPhase !== 'betting') {
          ans = null; wag = null;
          document.getElementById('customWag').value = '';
          document.getElementById('peekResult').innerText = '';
          document.querySelectorAll('.ans-btn').forEach(b => { b.classList.remove('selected'); b.disabled = false; });
          document.querySelectorAll('.wager-btn').forEach(b => b.classList.remove('selected'));
          document.getElementById('confirmBtn').innerText = "LOCK IN BET";
          document.getElementById('confirmBtn').disabled = true;
          document.getElementById('betError').innerText = "";
          
          const btn50 = document.getElementById('btn5050');
          const btnPk = document.getElementById('btnPeek');
          
          if(me.powerups.fifty > 0) { btn50.disabled = false; btn50.innerText = "💡 50/50"; }
          else { btn50.disabled = true; btn50.innerText = "❌ Used"; }
          
          if(me.powerups.peek > 0) { btnPk.disabled = false; btnPk.innerText = "🔍 Peek"; }
          else { btnPk.disabled = true; btnPk.innerText = "❌ Used"; }
      }
      if (me && me.bet) {
          document.getElementById('confirmBtn').innerText = "BET LOCKED";
          document.getElementById('confirmBtn').disabled = true;
          document.getElementById('btn5050').disabled = true;
          document.getElementById('btnPeek').disabled = true;
      }
      show('betScreen');
    }
    currentPhase = state.phase; 
  });
</script>
</body>
</html>
